name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── fast gates: run first, fail early ────────────────────────────────────
  lint:
    name: Ruff lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install "ruff==0.12.0"
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .

  typecheck:
    name: mypy (types.py strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy + stubs
        run: pip install "mypy>=1.10" "types-requests" requests
      - name: Type-check
        run: mypy rest_fetcher/types.py rest_fetcher/exceptions.py

  # ── test matrix ───────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: [lint, typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest
